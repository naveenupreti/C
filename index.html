<script>
const rawBase = "https://raw.githubusercontent.com/naveenupreti/Problem_Solving_Using_C/main/";

// Cache-buster to avoid browser caching
function getCacheBuster() {
  return "?v=" + new Date().getTime();
}

// Normalize file entry
function normalizeFileEntry(entry) {
  if (typeof entry === "string") return { path: entry };
  if (typeof entry === "object" && entry !== null) return entry;
  return null;
}

// Generate file URL
function getFileURL(fileObj) {
  if (fileObj.path.endsWith(".html")) {
    // Open HTML pages using GitHub Pages URL
    return "https://naveenupreti.github.io/Problem_Solving_Using_C/" + fileObj.path;
  } else {
    // Use raw GitHub link for other files (PDF, C, etc.)
    return rawBase + fileObj.path + getCacheBuster();
  }
}

// Render collapsible file list (syllabus, ebooks, examPapers)
function renderCollapsibleList(containerId, files, cssClass) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  if (!files || files.length === 0) {
    container.innerHTML = "<p>No files available.</p>";
    return;
  }

  const li = document.createElement("li");
  li.innerHTML = `<b class="${cssClass}">${containerId.replace("-list","").toUpperCase()}</b>`;
  const ul = document.createElement("ul");
  ul.className = "unit-content";
  ul.style.display = "none"; // collapsed by default

  files.forEach(f => {
    const fileObj = normalizeFileEntry(f);
    if (!fileObj || fileObj.hidden) return;

    const filePath = getFileURL(fileObj);
    const fileName = fileObj.title || fileObj.path.split("/").pop();

    const liFile = document.createElement("li");
    liFile.innerHTML = `<a href="${filePath}" target="_blank" rel="noopener">${fileName}</a>
      <span class="actions">
        <a class="download" href="${filePath}" download>Download</a>
      </span>`;
    ul.appendChild(liFile);
  });

  li.appendChild(ul);
  container.appendChild(li);

  // Expand/collapse functionality
  container.querySelectorAll("b." + cssClass).forEach(title => {
    title.addEventListener("click", () => {
      const content = title.nextElementSibling;
      if (content) content.style.display = content.style.display === "block" ? "none" : "block";
    });
  });
}

// Render units (notes, programs, assignments)
function renderUnits(containerId, unitsObj) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  if (!unitsObj || Object.keys(unitsObj).length === 0) {
    container.innerHTML = "<p>No data available.</p>";
    return;
  }

  for (const [unitName, files] of Object.entries(unitsObj)) {
    const li = document.createElement("li");
    li.innerHTML = `<b class="unit-title">${unitName}</b>`;
    const ul = document.createElement("ul");
    ul.className = "unit-content";
    ul.style.display = "none"; // collapsed by default

    files.forEach(f => {
      const fileObj = normalizeFileEntry(f);
      if (!fileObj || fileObj.hidden) return;

      const filePath = getFileURL(fileObj);
      const fileName = fileObj.title || fileObj.path.split("/").pop();

      const liFile = document.createElement("li");
      liFile.innerHTML = `<a href="${filePath}" target="_blank" rel="noopener">${fileName}</a>
        <span class="actions">
          <a class="download" href="${filePath}" download>Download</a>
        </span>`;
      ul.appendChild(liFile);
    });

    li.appendChild(ul);
    container.appendChild(li);
  }

  container.querySelectorAll(".unit-title").forEach(title => {
    title.addEventListener("click", () => {
      const content = title.nextElementSibling;
      if (content) content.style.display = content.style.display === "block" ? "none" : "block";
    });
  });
}

// Load data.json
async function loadData(force = false) {
  if (force) localStorage.removeItem("cNotesData");

  let data = localStorage.getItem("cNotesData");
  if (data) data = JSON.parse(data);
  else {
    try {
      const res = await fetch(rawBase + "data.json" + getCacheBuster(), { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to fetch data.json");
      data = await res.json();
      try { localStorage.setItem("cNotesData", JSON.stringify(data)); } catch (e) {}
    } catch (err) {
      alert("Error loading data: " + err.message);
      return;
    }
  }

  renderCollapsibleList("syllabus-list", data.syllabus, "syllabus-title");
  renderUnits("notes-list", data.notes);
  renderUnits("programs-list", data.programs);
  renderUnits("assignments-list", data.assignments);
  renderCollapsibleList("ebooks-list", data.ebooks, "ebook-title");
  renderCollapsibleList("examPapers-list", data.examPapers, "exam-title");
}

// Initialize
document.getElementById("refreshBtn").addEventListener("click", () => loadData(true));
loadData(false);
</script>
